# AI
langchain4j:
  open-ai:
    chat-model:
      base-url: https://api.deepseek.com
      api-key: key
      model-name: deepseek-chat
      log-requests: true
      log-responses: true
      max-tokens: 8192
    #      strict-json-schema: true
    #      response-format: json_object
    streaming-chat-model:
      base-url: https://api.deepseek.com
      api-key: key
      model-name: deepseek-chat
      log-requests: true
      log-responses: true
      max-tokens: 8192

    # 推理 AI 模型配置（用于复杂的推理任务）
    reasoning-streaming-chat-model:
      base-url: https://api.deepseek.com
      api-key: key
      model-name: deepseek-reasoner
      max-tokens: 32768
      temperature: 0.1
      log-requests: true
      log-responses: true
    # 智能路由 AI 模型配置（用于简单的分类任务）
    routing-chat-model:
      base-url: https://api.deepseek.com
      api-key: key
      model-name: deepseek-chat
      log-requests: true
      log-responses: true




