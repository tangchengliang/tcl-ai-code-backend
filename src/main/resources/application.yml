spring:
  application:
    name: tcl-ai-code-backend
  profiles:
    active: local
  session:
    store-type: redis
    # session 30 天过期
    timeout: 2592000

  # mysql
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/tcl_ai_code_mother
    username: root
    password: 123456

  # redis
  data:
    redis:
      host: localhost
      port: 6379
      password:
      ttl: 3600
      database: 0


server:
  port: 8123
  servlet:
    context-path: /api
    # cookie 30 天过期
    session:
      cookie:
        max-age: 2592000

# springdoc-openapi
springdoc:
  group-configs:
    - group: 'default'
      packages-to-scan: com.tcl.tclaicodebackend.controller
# knife4j
knife4j:
  enable: true
  setting:
    language: zh_cn

# 添加 COS 对象存储配置（需要从腾讯云获取）
cos:
  client:
    host: https://xx.cos.ap-chengdu.myqcloud.com
    secretId: xx
    secretKey: xx
    region: ap-chengdu
    bucket: xx

pexels:
  api-key: xxx

# 阿里云 DashScope 配置
dashscope:
  api-key: <Your API Key>
  image-model: wan2.2-t2i-flash

